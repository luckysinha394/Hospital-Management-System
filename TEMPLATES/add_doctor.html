<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Doctor</title>
    <style>
        * { padding: 0; margin: 0; }
        header { background-color: #0D0221; color: #f4f4f8; height: 70px; font-size: 40px; padding: 20px; font-weight: 600; }
        #a { height: 50px; width: 400px; margin: 20px; font-size: larger; background-color: #efefef; border: 0px; border-radius: 10px; padding: 8px; }
        #a1 { height: 60px; width: 400px; background-color: darkblue; font-size: 25px; color: white; font-weight: 300; margin: 20px; border-radius: 10px; cursor: pointer; }
        #person { color: white; margin: 20px; display: flex; justify-content: space-around; border-radius: 7px; }
        #details { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #login { background-color: #E4DFDA; width: 555px; padding: 40px; margin: 30px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body style="background-color: #f4f4f8;">
    <header>HEALTHWORLD HOSPITALS</header>
    <div style="display: flex; justify-content: center;">
        <div id="login" style="background-color: rgb(255, 255, 255); width: 555px; padding: 40px; margin: 30px;">
            <div id="person">
                <h2 style="color: #0D0221; font-size: 40px;">Add Doctor</h2>
            </div>
            <form action="/admin/dashboard/add_doctor" method="POST">
                <div id="details">
                    <input id="a" name="name" type="text" placeholder="Enter Doctor Name" required>
                    <input id="a" name="specialisation" type="text" placeholder="Enter Specialisation" required>
                    <input id="a" name="contact" type="text" placeholder="Enter Contact Number" required>
                    <input id="a" name="password" type="password" placeholder="Create Password" required>
                    <input id="a1" type="submit" value="Add Doctor">
                </div>
            </form>
        </div>
    </div>
</body>
</html>
